name: Go CI

on:
  push:
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build Go files
        run: |
          if [ -f go.mod ]; then
            go test ./...
          else
            mapfile -t dirs < <(find . -name '*.go' -not -path './.git/*' -printf '%h
' | sort -u)
            if [ ${#dirs[@]} -eq 0 ]; then
              echo "No Go files found"
            else
              for d in "${dirs[@]}"; do
                echo "Testing Go files in $d"
                (cd "$d" && GO111MODULE=off go test .)
              done
            fi
          fi
